<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carregando...</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#fce7f3',
                            DEFAULT: '#db2777', // Rosa principal
                            dark: '#be185d',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; /* Previne rolagem horizontal acidental */
        }
        
        h1, h2, h3, .serif { 
            font-family: 'Playfair Display', serif; 
        }
        
        /* Ocultar barra de rolagem horizontal nativa */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loader Elegante */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(219, 39, 119, 0.3);
            border-radius: 50%;
            border-top-color: #db2777;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Utilitário para equilibrar textos longos */
        .text-balance {
            text-wrap: balance;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-500 w-full">

    <!-- Container Principal -->
    <div id="app" class="min-h-screen flex flex-col w-full">
        <!-- Tela de Carregamento Inicial -->
        <div class="flex-1 flex flex-col items-center justify-center min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors px-4 text-center">
            <div class="spinner mb-6"></div>
            <h2 class="text-lg md:text-xl font-medium text-gray-600 dark:text-gray-300 animate-pulse">Conectando ao banco de dados...</h2>
        </div>
    </div>

    <!-- Lógica da Aplicação - Firebase Realtime Database -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 1. CONFIGURAÇÕES DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBl6NR3OY8swcyAbxmxTptwbnghB3iHFRQ",
            authDomain: "terra-fertil-a5bb4.firebaseapp.com",
            projectId: "terra-fertil-a5bb4",
            storageBucket: "terra-fertil-a5bb4.firebasestorage.app",
            messagingSenderId: "869435719410",
            appId: "1:869435719410:web:32c855391f8d8888a9da6b",
            databaseURL: "https://terra-fertil-a5bb4-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Estado Global
        const state = {
            config: { nome: 'Terra Fértil', subtitulo: '', tema: 'claro' },
            galeria: [],
            videos: [],
            avisos: [],
            eventos: [],
            redes: {},
            versiculos: [],
            isLoaded: false
        };

        // 2. INICIALIZAÇÃO
        async function initApp() {
            try {
                await signInAnonymously(auth);
                setupRealtimeListeners();
            } catch (error) {
                document.getElementById('app').innerHTML = `
                    <div class="flex items-center justify-center min-h-screen bg-red-50 text-red-600 p-6 text-center w-full">
                        <div>
                            <svg class="w-12 h-12 md:w-16 md:h-16 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h1 class="text-xl md:text-2xl font-bold mb-2">Erro de Conexão</h1>
                            <p class="text-sm md:text-base">${error.message}</p>
                        </div>
                    </div>`;
            }
        }

        // 3. LISTENERS DO BANCO DE DADOS
        function setupRealtimeListeners() {
            const nodes = ['config_site', 'galeria', 'videos', 'avisos', 'eventos', 'redes_sociais', 'versiculos'];
            let loadedNodes = 0;

            nodes.forEach(node => {
                const dbRef = ref(db, node);
                onValue(dbRef, (snapshot) => {
                    const data = snapshot.val();
                    
                    if (data) {
                        if (['galeria', 'videos', 'avisos', 'eventos', 'versiculos'].includes(node)) {
                            state[node] = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                        } 
                        else if (node === 'config_site') {
                            state.config = data; 
                            applyConfig();
                        } else if (node === 'redes_sociais') {
                            state.redes = data; 
                        }
                    } else {
                        if (['galeria', 'videos', 'avisos', 'eventos', 'versiculos'].includes(node)) {
                            state[node] = [];
                        } else {
                            state[node === 'config_site' ? 'config' : 'redes'] = {};
                        }
                    }

                    if (!state.isLoaded) {
                        loadedNodes++;
                        if (loadedNodes >= nodes.length) {
                            state.isLoaded = true;
                            renderApp();
                        }
                    } else {
                        renderApp(); 
                    }
                });
            });
        }

        // 4. FUNÇÕES AUXILIARES
        function applyConfig() {
            document.title = `${state.config.nome || 'Site'} - ${state.config.subtitulo || ''}`;
            if (state.config.tema === 'escuro') {
                document.body.classList.add('dark', 'bg-gray-900', 'text-white');
                document.body.classList.remove('bg-gray-50', 'text-gray-800');
            } else {
                document.body.classList.remove('dark', 'bg-gray-900', 'text-white');
                document.body.classList.add('bg-gray-50', 'text-gray-800');
            }
        }

        function getYoutubeId(url) {
            if(!url) return null;
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        // Abre modal da galeria responsivo
        window.openImageModal = (url, title, desc) => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-4 md:p-8 opacity-0 transition-opacity duration-300 cursor-pointer backdrop-blur-sm w-full h-full overflow-hidden';
            modal.onclick = () => {
                modal.classList.remove('opacity-100');
                setTimeout(() => modal.remove(), 300);
            };
            
            modal.innerHTML = `
                <div class="max-w-5xl w-full text-center transform scale-95 transition-transform duration-300 flex flex-col items-center justify-center h-full p-2" id="modal-content" onclick="event.stopPropagation()">
                    <img src="${url}" class="max-w-full max-h-[55vh] md:max-h-[70vh] rounded-xl shadow-2xl mb-4 md:mb-6 object-contain border border-gray-800">
                    <h3 class="text-white text-2xl md:text-3xl font-bold serif text-balance px-2">${title || ''}</h3>
                    <p class="text-gray-300 mt-2 md:mt-3 text-sm md:text-lg overflow-y-auto max-h-[20vh] px-2 text-balance">${desc !== 'undefined' && desc ? desc : ''}</p>
                    <button onclick="this.closest('.fixed').click()" class="mt-6 md:mt-8 bg-brand hover:bg-brand-dark text-white px-6 py-2.5 md:px-8 md:py-3 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base shadow-lg">Fechar Janela</button>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.querySelector('#modal-content').classList.remove('scale-95');
            }, 10);
        };

        // Filtro da Galeria
        window.filterGallery = (term) => {
            const items = document.querySelectorAll('.gallery-item');
            term = term.toLowerCase();
            items.forEach(item => {
                const text = item.getAttribute('data-search').toLowerCase();
                if (text.includes(term)) {
                    item.style.display = 'block';
                    setTimeout(() => item.style.opacity = '1', 10);
                } else {
                    item.style.opacity = '0';
                    setTimeout(() => item.style.display = 'none', 300);
                }
            });
        };

        // 5. RENDERIZAÇÃO DA INTERFACE (Totalmente Responsiva)
        function renderApp() {
            const appDiv = document.getElementById('app');
            const c = state.config;

            // ================= HEADER / BANNER =================
            const bannerStyle = c.banner 
                ? `background-image: url('${c.banner}'); background-size: cover; background-position: center;` 
                : 'background: linear-gradient(135deg, #1f2937 0%, #000000 100%);';

            const heroHtml = `
                <header class="relative w-full min-h-[55vh] md:h-[70vh] overflow-hidden flex flex-col justify-end md:justify-start" style="${bannerStyle}">
                    <!-- Overlay dinâmico: mais escuro embaixo no mobile para o texto aparecer bem -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-black/30 md:bg-black/30"></div> 
                    
                    <!-- Logo e Título: Centro no mobile, Esquerda no Desktop -->
                    <div class="relative z-10 p-6 pt-12 pb-10 md:p-12 animate-fade-in-up flex flex-col md:flex-row items-center md:items-start text-center md:text-left gap-4 md:gap-6 w-full">
                        ${c.logo ? `<img src="${c.logo}" class="w-24 h-24 sm:w-28 sm:h-28 md:w-32 md:h-32 rounded-full object-cover border-[3px] border-white shadow-2xl shrink-0" alt="Logo">` : ''}
                        <div class="flex flex-col justify-center">
                            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-1 md:mb-2 leading-tight serif tracking-tight drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] text-balance">${c.nome || 'Bem-vindo'}</h1>
                            ${c.subtitulo ? `<p class="text-xs sm:text-sm md:text-xl text-brand-light font-bold tracking-[0.15em] uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] text-balance">${c.subtitulo}</p>` : ''}
                        </div>
                    </div>
                </header>
            `;

            // ================= VERSÍCULO =================
            let versiculoHtml = '';
            if (state.versiculos && state.versiculos.length > 0) {
                const v = state.versiculos[Math.floor(Math.random() * state.versiculos.length)];
                versiculoHtml = `
                    <section class="py-12 md:py-16 px-4 md:px-6 bg-brand text-white text-center relative overflow-hidden w-full">
                        <svg class="absolute -top-16 -right-16 md:-top-24 md:-right-24 w-48 h-48 md:w-64 md:h-64 text-white opacity-5 transform rotate-45" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 14a6 6 0 110-12 6 6 0 010 12z"/></svg>
                        <div class="max-w-4xl mx-auto relative z-10">
                            <svg class="w-8 h-8 md:w-10 md:h-10 mx-auto mb-3 md:mb-4 opacity-40" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
                            <p class="text-xl md:text-3xl font-light italic mb-4 md:mb-6 leading-relaxed serif text-balance px-2">"${v.texto}"</p>
                            <p class="text-base md:text-lg font-bold tracking-widest uppercase">— ${v.referencia}</p>
                        </div>
                    </section>
                `;
            }

            // ================= AVISOS =================
            let avisosHtml = '';
            if (state.avisos && state.avisos.length > 0) {
                avisosHtml = `
                    <section class="py-16 md:py-20 px-4 md:px-6 max-w-7xl mx-auto w-full">
                        <div class="text-center mb-10 md:mb-14">
                            <h3 class="text-3xl md:text-4xl font-bold serif text-gray-900 dark:text-white">Quadro de Avisos</h3>
                            <div class="w-20 md:w-24 h-1 bg-brand mx-auto mt-3 md:mt-4 rounded-full"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                            ${state.avisos.map(a => `
                                <div class="group bg-white dark:bg-gray-800 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden border border-gray-100 dark:border-gray-700 flex flex-col h-full relative">
                                    ${a.importante ? `<div class="absolute top-3 right-3 md:top-4 md:right-4 z-20 bg-red-600 text-white text-[10px] md:text-xs font-bold px-2.5 py-1 rounded-full shadow-lg uppercase tracking-wide">Importante</div>` : ''}
                                    ${a.imagem ? `<div class="w-full h-48 md:h-52 overflow-hidden relative"><img src="${a.imagem}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"></div>` : ''}
                                    <div class="p-6 md:p-8 flex-1 flex flex-col">
                                        <h4 class="text-xl md:text-2xl font-bold mb-2 md:mb-3 text-gray-900 dark:text-white group-hover:text-brand transition-colors text-balance">${a.titulo}</h4>
                                        <p class="text-sm md:text-base text-gray-600 dark:text-gray-400 flex-1 leading-relaxed">${a.descricao}</p>
                                    </div>
                                    <div class="h-1 w-full ${a.importante ? 'bg-red-600' : 'bg-brand'}"></div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            // ================= EVENTOS =================
            let eventosHtml = '';
            if (state.eventos && state.eventos.length > 0) {
                const eventosOrdenados = [...state.eventos].sort((a, b) => new Date(a.data) - new Date(b.data));
                
                eventosHtml = `
                    <section class="py-16 md:py-20 px-4 md:px-6 bg-gray-100 dark:bg-gray-800/40 w-full">
                        <div class="max-w-5xl mx-auto w-full">
                            <div class="text-center mb-10 md:mb-14">
                                <h3 class="text-3xl md:text-4xl font-bold serif text-gray-900 dark:text-white">Próximos Eventos</h3>
                                <div class="w-20 md:w-24 h-1 bg-brand mx-auto mt-3 md:mt-4 rounded-full"></div>
                            </div>
                            <div class="space-y-4 md:space-y-6">
                                ${eventosOrdenados.map(e => {
                                    const partesData = e.data.split('-');
                                    const ano = parseInt(partesData[0]);
                                    const mesNum = parseInt(partesData[1]) - 1; 
                                    const dia = partesData[2];
                                    
                                    const dateObj = new Date(ano, mesNum, dia);
                                    const mesStr = dateObj.toLocaleString('pt-BR', { month: 'short' }).replace('.','').toUpperCase();
                                    
                                    return `
                                    <div class="group flex flex-col sm:flex-row bg-white dark:bg-gray-800 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden border border-gray-100 dark:border-gray-700">
                                        <!-- Bloco da Data: Horizontal no mobile, Vertical no desktop -->
                                        <div class="bg-brand text-white p-4 sm:p-6 w-full sm:w-32 md:w-36 flex flex-row sm:flex-col justify-center items-center text-center gap-2 sm:gap-0 shrink-0">
                                            <span class="text-3xl md:text-4xl font-bold leading-none">${dia}</span>
                                            <span class="text-sm md:text-sm tracking-widest font-medium">${mesStr}</span>
                                        </div>
                                        <div class="p-5 md:p-8 flex-1 flex flex-col justify-center">
                                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-2 gap-2">
                                                <h4 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white group-hover:text-brand transition-colors text-balance pr-2">${e.titulo}</h4>
                                                ${e.hora ? `<span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-3 py-1 md:py-1.5 rounded-full text-xs md:text-sm font-semibold flex items-center gap-1.5 whitespace-nowrap self-start md:self-auto"><svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${e.hora}</span>` : ''}
                                            </div>
                                            ${e.descricao ? `<p class="text-sm md:text-base text-gray-600 dark:text-gray-400 mt-1 md:mt-2 mb-3 leading-relaxed">${e.descricao}</p>` : '<div class="mb-2"></div>'}
                                            ${e.local ? `<p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 font-medium flex items-center gap-1.5"><svg class="w-4 h-4 md:w-5 md:h-5 text-brand shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> <span class="truncate">${e.local}</span></p>` : ''}
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }

            // ================= GALERIA =================
            let galeriaHtml = '';
            if (state.galeria && state.galeria.length > 0) {
                const galeriaInvertida = [...state.galeria].reverse();
                
                galeriaHtml = `
                    <section class="py-16 md:py-20 px-4 md:px-6 max-w-7xl mx-auto w-full">
                        <div class="flex flex-col md:flex-row justify-between items-center md:items-end mb-8 md:mb-12 gap-4 md:gap-6">
                            <div class="text-center md:text-left w-full md:w-auto">
                                <h3 class="text-3xl md:text-4xl font-bold serif text-gray-900 dark:text-white">Nossa Galeria</h3>
                                <div class="w-20 md:w-24 h-1 bg-brand mx-auto md:mx-0 mt-3 md:mt-4 rounded-full"></div>
                            </div>
                            <div class="relative w-full md:w-80">
                                <input type="text" placeholder="Pesquisar fotos..." onkeyup="filterGallery(this.value)" class="w-full pl-10 pr-4 py-2.5 md:py-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-brand shadow-sm transition text-sm md:text-base">
                                <svg class="w-4 h-4 md:w-5 md:h-5 absolute left-3 top-3 md:top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>
                        </div>
                        
                        <!-- 2 colunas no mobile p/ não ficar enorme, e até 4 no desktop -->
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6" id="gallery-grid">
                            ${galeriaInvertida.map(g => `
                                <div class="gallery-item group relative aspect-square overflow-hidden rounded-xl md:rounded-2xl cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300" data-search="${g.titulo} ${g.descricao || ''}" onclick="openImageModal('${g.imagem}', '${g.titulo}', '${g.descricao || ''}')">
                                    <img src="${g.imagem}" loading="lazy" class="w-full h-full object-cover transform group-hover:scale-105 transition duration-500">
                                    <!-- Gradiente visível no toque em mobile ou hover no desktop -->
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition duration-300 flex flex-col justify-end p-3 md:p-6">
                                        <h4 class="text-white font-bold text-sm md:text-lg mb-0.5 md:mb-1 transform translate-y-2 md:translate-y-4 group-hover:translate-y-0 transition duration-300 line-clamp-1">${g.titulo}</h4>
                                        ${g.descricao ? `<p class="text-gray-300 text-xs md:text-sm line-clamp-2 transform translate-y-2 md:translate-y-4 group-hover:translate-y-0 transition duration-300 delay-75">${g.descricao}</p>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            // ================= VIDEOS =================
            let videosHtml = '';
            if (state.videos && state.videos.length > 0) {
                videosHtml = `
                    <section class="py-16 md:py-20 px-0 md:px-6 bg-gray-900 text-white overflow-hidden w-full">
                        <div class="max-w-7xl mx-auto">
                            <div class="text-center mb-10 md:mb-14 px-4">
                                <h3 class="text-3xl md:text-4xl font-bold serif">Vídeos em Destaque</h3>
                                <div class="w-20 md:w-24 h-1 bg-brand mx-auto mt-3 md:mt-4 rounded-full"></div>
                            </div>
                            
                            <div class="flex overflow-x-auto hide-scroll gap-4 md:gap-8 pb-8 snap-x snap-mandatory px-4 md:px-0">
                                ${state.videos.map(v => {
                                    const yid = getYoutubeId(v.urlYoutube);
                                    if(!yid) return '';
                                    return `
                                    <div class="snap-center shrink-0 w-[85vw] sm:w-[320px] md:w-[400px] bg-gray-800 rounded-xl md:rounded-2xl overflow-hidden shadow-2xl border border-gray-700 hover:border-gray-500 transition-colors flex flex-col">
                                        <div class="aspect-video relative w-full">
                                            <iframe class="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/${yid}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                        </div>
                                        <div class="p-4 md:p-6 flex-1">
                                            <h4 class="font-bold text-lg md:text-xl mb-1 md:mb-2 line-clamp-2">${v.titulo}</h4>
                                            ${v.descricao ? `<p class="text-gray-400 text-xs md:text-sm line-clamp-2 md:line-clamp-3">${v.descricao}</p>` : ''}
                                        </div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }

            // ================= FOOTER / REDES SOCIAIS =================
            const r = state.redes || {};
            const footerHtml = `
                <footer class="bg-black text-white py-12 md:py-16 text-center relative border-t-4 border-brand w-full">
