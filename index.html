<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- O título será injetado dinamicamente -->
    <title>Carregando...</title>
    
    <!-- Tailwind CSS para Design Moderno e Responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#fdf2f8',
                            DEFAULT: '#db2777', // Rosa profissional
                            dark: '#9d174d',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Estilos Adicionais -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        
        /* Modal e transições */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark .glass-panel { background: rgba(31, 41, 55, 0.9); }
        
        /* Ocultar barra de rolagem no grid horizontal */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loader */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #db2777; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- Manifesto PWA Dinâmico Injetado via JS -->
    <link id="pwa-manifest" rel="manifest" href="">
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300">

    <!-- Container Principal do App (Tudo gerado dinamicamente aqui) -->
    <div id="app" class="min-h-screen flex flex-col relative">
        <div class="flex-1 flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="loader"></div>
                <p class="text-gray-500 animate-pulse" id="loading-text">Conectando aos servidores...</p>
            </div>
        </div>
    </div>

    <!-- Firebase e Lógica da Aplicação -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 1. CONFIGURAÇÕES GERAIS E API
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBl6NR3OY8swcyAbxmxTptwbnghB3iHFRQ",
            authDomain: "terra-fertil-a5bb4.firebaseapp.com",
            projectId: "terra-fertil-a5bb4",
            storageBucket: "terra-fertil-a5bb4.firebasestorage.app",
            messagingSenderId: "869435719410",
            appId: "1:869435719410:web:32c855391f8d8888a9da6b",
            measurementId: "G-VZ14MQG9KF"
        };
        const IMGBB_API_KEY = "d6bfa5a94700a8086f78f1674758e7ab";

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado Global da Aplicação
        const state = {
            isAdmin: false,
            config: {},
            galeria: [],
            videos: [],
            avisos: [],
            eventos: [],
            redes: {},
            versiculos: []
        };

        // ==========================================
        // 2. INICIALIZAÇÃO E PWA
        // ==========================================
        async function initApp() {
            try {
                // Autenticação anônima garantida para regras básicas do Firestore
                await signInAnonymously(auth);
                setupRealtimeListeners();
            } catch (error) {
                document.getElementById('app').innerHTML = `<div class="p-10 text-red-500 text-center">Erro ao conectar com banco de dados: ${error.message}</div>`;
            }
        }

        function setupPWA(config) {
            const manifest = {
                name: config.nome || "App",
                short_name: config.subtitulo || "App",
                start_url: "/",
                display: "standalone",
                background_color: config.tema === 'escuro' ? '#1f2937' : '#f8f9fa',
                theme_color: "#db2777"
            };
            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
        }

        // ==========================================
        // 3. LISTENERS EM TEMPO REAL (FIRESTORE)
        // ==========================================
        function setupRealtimeListeners() {
            // Configurações Globais
            onSnapshot(collection(db, "config_site"), (snapshot) => {
                if(!snapshot.empty) {
                    state.config = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
                    document.title = `${state.config.nome || 'Site'} - ${state.config.subtitulo || ''}`;
                    if(state.config.tema === 'escuro') document.body.classList.add('dark', 'bg-gray-900', 'text-white');
                    else document.body.classList.remove('dark', 'bg-gray-900', 'text-white');
                    setupPWA(state.config);
                }
                renderApp();
            });

            // Demais coleções
            const collections = ['galeria', 'videos', 'avisos', 'eventos', 'redes_sociais', 'versiculos'];
            collections.forEach(col => {
                onSnapshot(collection(db, col), (snapshot) => {
                    if (col === 'redes_sociais' && !snapshot.empty) {
                        state.redes = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
                    } else {
                        state[col] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    renderApp();
                });
            });
        }

        // ==========================================
        // 4. FUNÇÕES UTILITÁRIAS
        // ==========================================
        function getYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.toggleAdmin = () => {
            state.isAdmin = !state.isAdmin;
            renderApp();
        };

        window.openImageModal = (url, title, desc) => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4 fade-in cursor-pointer';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `
                <div class="max-w-4xl w-full text-center" onclick="event.stopPropagation()">
                    <img src="${url}" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl mx-auto mb-4 object-contain">
                    <h3 class="text-white text-2xl font-bold">${title || ''}</h3>
                    <p class="text-gray-300 mt-2">${desc || ''}</p>
                    <button onclick="this.closest('.fixed').remove()" class="mt-4 bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200">Fechar</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.filterGallery = (term) => {
            const items = document.querySelectorAll('.gallery-item');
            term = term.toLowerCase();
            items.forEach(item => {
                const text = item.getAttribute('data-search').toLowerCase();
                item.style.display = text.includes(term) ? 'block' : 'none';
            });
        };

        // ==========================================
        // 5. RENDERIZAÇÃO DA INTERFACE (NADA ESTÁTICO)
        // ==========================================
        function renderApp() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = ''; // Limpa tudo

            if (state.isAdmin) {
                appDiv.appendChild(renderAdminPanel());
            } else {
                appDiv.appendChild(renderPublicSite());
            }
        }

        // --- RENDER SITE PÚBLICO ---
        function renderPublicSite() {
            const container = document.createElement('div');
            container.className = 'w-full fade-in';
            const c = state.config;

            // 1. Cabeçalho / Hero Banner
            const heroHtml = `
                <header class="relative w-full h-[60vh] md:h-[80vh] flex items-center justify-center overflow-hidden bg-gray-900">
                    ${c.banner ? `<img src="${c.banner}" class="absolute inset-0 w-full h-full object-cover opacity-50" alt="Banner">` : ''}
                    <div class="relative z-10 text-center px-4 glass-panel p-8 md:p-12 rounded-2xl shadow-2xl max-w-3xl mx-auto">
                        ${c.logo ? `<img src="${c.logo}" class="w-24 h-24 md:w-32 md:h-32 mx-auto rounded-full object-cover border-4 border-brand shadow-lg mb-6" alt="Logo">` : ''}
                        <h1 class="text-3xl md:text-5xl font-bold text-gray-900 dark:text-white mb-2 leading-tight">${c.nome || 'Bem-vindo'}</h1>
                        <h2 class="text-lg md:text-2xl text-brand font-semibold">${c.subtitulo || ''}</h2>
                    </div>
                </header>
            `;

            // 2. Versículo em destaque
            let versiculoHtml = '';
            if (state.versiculos.length > 0) {
                const v = state.versiculos[Math.floor(Math.random() * state.versiculos.length)];
                versiculoHtml = `
                    <section class="py-12 px-4 bg-brand text-white text-center">
                        <div class="max-w-4xl mx-auto">
                            <svg class="w-10 h-10 mx-auto mb-4 opacity-50" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
                            <p class="text-xl md:text-3xl font-light italic mb-4">"${v.texto}"</p>
                            <p class="text-lg font-bold">— ${v.referencia}</p>
                        </div>
                    </section>
                `;
            }

            // 3. Avisos Importantes
            let avisosHtml = '';
            if (state.avisos.length > 0) {
                avisosHtml = `
                    <section class="py-16 px-4 max-w-7xl mx-auto">
                        <h3 class="text-3xl font-bold text-center mb-10 serif">Quadro de Avisos</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${state.avisos.map(a => `
                                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border-t-4 ${a.importante ? 'border-red-500 transform hover:-translate-y-1 transition' : 'border-brand'}">
                                    ${a.imagem ? `<img src="${a.imagem}" class="w-full h-48 object-cover">` : ''}
                                    <div class="p-6">
                                        <div class="flex items-center justify-between mb-2">
                                            <h4 class="text-xl font-bold">${a.titulo}</h4>
                                            ${a.importante ? `<span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-1 rounded">Importante</span>` : ''}
                                        </div>
                                        <p class="text-gray-600 dark:text-gray-300">${a.descricao}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            // 4. Agenda / Eventos
            let eventosHtml = '';
            if (state.eventos.length > 0) {
                eventosHtml = `
                    <section class="py-16 px-4 bg-gray-100 dark:bg-gray-800/50">
                        <div class="max-w-4xl mx-auto">
                            <h3 class="text-3xl font-bold text-center mb-10 serif">Próximos Eventos</h3>
                            <div class="space-y-4">
                                ${state.eventos.sort((a,b) => new Date(a.data) - new Date(b.data)).map(e => `
                                    <div class="flex flex-col md:flex-row bg-white dark:bg-gray-800 rounded-lg shadow p-4 md:p-6 items-center border-l-4 border-brand">
                                        <div class="flex-shrink-0 text-center md:mr-8 mb-4 md:mb-0">
                                            <div class="text-brand font-bold text-2xl">${new Date(e.data).toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}).toUpperCase()}</div>
                                            <div class="text-gray-500 text-sm">${e.hora || ''}</div>
                                        </div>
                                        <div class="flex-grow text-center md:text-left">
                                            <h4 class="text-xl font-bold">${e.titulo}</h4>
                                            <p class="text-gray-600 dark:text-gray-400 mt-1">${e.descricao}</p>
                                            <p class="text-sm text-gray-500 mt-2 font-semibold">📍 ${e.local}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }

            // 5. Galeria Dinâmica
            let galeriaHtml = '';
            if (state.galeria.length > 0) {
                galeriaHtml = `
                    <section class="py-16 px-4 max-w-7xl mx-auto">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                            <h3 class="text-3xl font-bold serif">Nossa Galeria</h3>
                            <input type="text" placeholder="Pesquisar fotos..." onkeyup="filterGallery(this.value)" class="px-4 py-2 rounded-full border border-gray-300 dark:border-gray-600 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-brand w-full md:w-72">
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid">
                            ${state.galeria.map(g => `
                                <div class="gallery-item group relative aspect-square overflow-hidden rounded-xl cursor-pointer shadow-sm hover:shadow-xl transition" data-search="${g.titulo} ${g.descricao}" onclick="openImageModal('${g.imagem}', '${g.titulo}', '${g.descricao}')">
                                    <img src="${g.imagem}" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition duration-300 flex flex-col justify-end p-4">
                                        <h4 class="text-white font-bold">${g.titulo}</h4>
                                        <p class="text-gray-200 text-sm truncate">${g.descricao || ''}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            // 6. Vídeos (YouTube Embed)
            let videosHtml = '';
            if (state.videos.length > 0) {
                videosHtml = `
                    <section class="py-16 px-4 bg-gray-900 text-white">
                        <div class="max-w-7xl mx-auto">
                            <h3 class="text-3xl font-bold text-center mb-10 serif">Vídeos Recentes</h3>
                            <div class="flex overflow-x-auto hide-scroll gap-6 pb-8 snap-x">
                                ${state.videos.map(v => {
                                    const yid = getYoutubeId(v.urlYoutube);
                                    if(!yid) return '';
                                    return `
                                    <div class="snap-center shrink-0 w-80 md:w-96 bg-gray-800 rounded-xl overflow-hidden shadow-2xl">
                                        <iframe width="100%" height="215" src="https://www.youtube.com/embed/${yid}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                        <div class="p-5">
                                            <h4 class="font-bold text-lg mb-2">${v.titulo}</h4>
                                            <p class="text-gray-400 text-sm line-clamp-2">${v.descricao}</p>
                                        </div>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }

            // 7. Rodapé Dinâmico
            const r = state.redes || {};
            const footerHtml = `
                <footer class="bg-black text-white py-12 text-center relative">
                    <div class="max-w-4xl mx-auto px-4 flex flex-col items-center">
                        <h4 class="text-2xl font-bold serif mb-6">${c.nome || 'Conecte-se conosco'}</h4>
                        <div class="flex gap-6 mb-8">
                            ${r.instagram ? `<a href="${r.instagram}" target="_blank" class="hover:text-brand transition">Instagram</a>` : ''}
                            ${r.facebook ? `<a href="${r.facebook}" target="_blank" class="hover:text-brand transition">Facebook</a>` : ''}
                            ${r.youtube ? `<a href="${r.youtube}" target="_blank" class="hover:text-brand transition">YouTube</a>` : ''}
                            ${r.tiktok ? `<a href="${r.tiktok}" target="_blank" class="hover:text-brand transition">TikTok</a>` : ''}
                        </div>
                        <p class="text-gray-500 text-sm">&copy; ${new Date().getFullYear()} ${c.nome || 'Site'}. Todos os direitos reservados.</p>
                        
                        <button onclick="toggleAdmin()" class="mt-8 text-xs text-gray-700 hover:text-gray-400 border border-gray-800 px-3 py-1 rounded transition">Acesso Administrativo</button>
                    </div>
                </footer>
            `;

            container.innerHTML = heroHtml + versiculoHtml + avisosHtml + eventosHtml + galeriaHtml + videosHtml + footerHtml;
            return container;
        }

        // --- RENDER PAINEL ADMINISTRATIVO ---
        function renderAdminPanel() {
            const container = document.createElement('div');
            container.className = 'w-full min-h-screen bg-gray-100 dark:bg-gray-900 fade-in p-4 md:p-8';
            
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-8 bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
                        <div>
                            <h2 class="text-2xl font-bold text-brand">Painel de Controle</h2>
                            <p class="text-gray-500 text-sm">Gerenciamento em Tempo Real</p>
                        </div>
                        <button onclick="toggleAdmin()" class="bg-gray-200 hover:bg-gray-300 text-black px-4 py-2 rounded-lg font-semibold transition">Voltar ao Site</button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        <!-- Coluna 1: Formulários de Adição -->
                        <div class="lg:col-span-1 space-y-6">
                            
                            <!-- Form Galeria -->
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
                                <h3 class="font-bold text-lg mb-4 border-b pb-2">Nova Foto (Galeria)</h3>
                                <form onsubmit="handleUpload(event, 'galeria')" class="space-y-3">
                                    <input type="text" id="g-titulo" placeholder="Título" required class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                                    <textarea id="g-desc" placeholder="Descrição/Legenda" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600"></textarea>
                                    <input type="date" id="g-data" required class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                                    <input type="file" id="g-file" accept="image/*" required class="w-full text-sm">
                                    <button type="submit" class="w-full bg-brand text-white py-2 rounded font-bold hover:bg-brand-dark transition">Fazer Upload e Salvar</button>
                                    <p id="g-status" class="text-xs text-center text-gray-500"></p>
                                </form>
                            </div>

                            <!-- Form Aviso -->
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
                                <h3 class="font-bold text-lg mb-4 border-b pb-2">Novo Aviso</h3>
                                <form onsubmit="handleSave(event, 'avisos')" class="space-y-3">
                                    <input type="text" id="a-titulo" placeholder="Título" required class="w-full p-2 border rounded dark:bg-gray-700">
                                    <textarea id="a-descricao" placeholder="Descrição" required class="w-full p-2 border rounded dark:bg-gray-700"></textarea>
                                    <input type="url" id="a-imagem" placeholder="URL da Imagem (Opcional)" class="w-full p-2 border rounded dark:bg-gray-700">
                                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="a-importante"> Marcar como Urgente/Importante</label>
                                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">Salvar Aviso</button>
                                </form>
                            </div>

                            <!-- Form Vídeo -->
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
                                <h3 class="font-bold text-lg mb-4 border-b pb-2">Adicionar Vídeo YouTube</h3>
                                <form onsubmit="handleSave(event, 'videos')" class="space-y-3">
                                    <input type="text" id="v-titulo" placeholder="Título" required class="w-full p-2 border rounded dark:bg-gray-700">
                                    <input type="url" id="v-urlYoutube" placeholder="Link do YouTube" required class="w-full p-2 border rounded dark:bg-gray-700">
                                    <textarea id="v-descricao" placeholder="Descrição curta" class="w-full p-2 border rounded dark:bg-gray-700"></textarea>
                                    <button type="submit" class="w-full bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700 transition">Salvar Vídeo</button>
                                </form>
                            </div>

                        </div>

                        <!-- Coluna 2 e 3: Listagem de Dados para Exclusão/Gerenciamento -->
                        <div class="lg:col-span-2 space-y-6">
                            
                            <!-- Configurações do Site -->
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow border-l-4 border-brand">
                                <h3 class="font-bold text-lg mb-4 border-b pb-2">Configurações Gerais do Site</h3>
                                <form onsubmit="saveConfig(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="text-xs text-gray-500">Nome do Conjunto</label>
                                        <input type="text" id="c-nome" value="${state.config.nome || ''}" class="w-full p-2 border rounded dark:bg-gray-700">
                                    </div>
                                    <div>
                                        <label class="text-xs text-gray-500">Subtítulo</label>
                                        <input type="text" id="c-subtitulo" value="${state.config.subtitulo || ''}" class="w-full p-2 border rounded dark:bg-gray-700">
                                    </div>
                                    <div>
                                        <label class="text-xs text-gray-500">URL da Logo</label>
                                        <input type="url" id="c-logo" value="${state.config.logo || ''}" class="w-full p-2 border rounded dark:bg-gray-700">
                                    </div>
                                    <div>
                                        <label class="text-xs text-gray-500">URL do Banner Principal</label>
                                        <input type="url" id="c-banner" value="${state.config.banner || ''}" class="w-full p-2 border rounded dark:bg-gray-700">
                                    </div>
                                    <div>
                                        <label class="text-xs text-gray-500">Tema</label>
                                        <select id="c-tema" class="w-full p-2 border rounded dark:bg-gray-700">
                                            <option value="claro" ${state.config.tema === 'claro' ? 'selected' : ''}>Claro (Fundo Branco)</option>
                                            <option value="escuro" ${state.config.tema === 'escuro' ? 'selected' : ''}>Escuro (Modo Dark)</option>
                                        </select>
                                    </div>
                                    <div class="md:col-span-2 flex justify-end mt-2">
                                        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700 transition">Atualizar Configurações</button>
                                    </div>
                                </form>
                            </div>

                            <!-- Listagens dinâmicas com botão excluir -->
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow overflow-hidden">
                                <h3 class="font-bold text-lg mb-4 border-b pb-2">Itens Publicados (Clique para apagar)</h3>
                                
                                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
                                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mt-4">Fotos da Galeria</h4>
                                    ${state.galeria.map(i => `
                                        <div class="flex justify-between items-center p-2 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100 dark:border-gray-600">
                                            <div class="flex items-center gap-3">
                                                <img src="${i.imagem}" class="w-10 h-10 object-cover rounded">
                                                <span class="text-sm font-medium">${i.titulo}</span>
                                            </div>
                                            <button onclick="deleteItem('galeria', '${i.id}')" class="text-red-500 hover:text-red-700 text-sm font-bold px-2">X Excluir</button>
                                        </div>
                                    `).join('') || '<p class="text-xs text-gray-400">Nenhuma foto cadastrada.</p>'}

                                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mt-6">Vídeos</h4>
                                    ${state.videos.map(i => `
                                        <div class="flex justify-between items-center p-2 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100">
                                            <span class="text-sm font-medium truncate w-64">🎥 ${i.titulo}</span>
                                            <button onclick="deleteItem('videos', '${i.id}')" class="text-red-500 hover:text-red-700 text-sm font-bold px-2">X Excluir</button>
                                        </div>
                                    `).join('') || '<p class="text-xs text-gray-400">Nenhum vídeo cadastrado.</p>'}

                                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mt-6">Avisos</h4>
                                    ${state.avisos.map(i => `
                                        <div class="flex justify-between items-center p-2 bg-gray-50 dark:bg-gray-700 rounded border border-gray-100">
                                            <span class="text-sm font-medium truncate w-64">📢 ${i.titulo} ${i.importante ? '(Urgente)' : ''}</span>
                                            <button onclick="deleteItem('avisos', '${i.id}')" class="text-red-500 hover:text-red-700 text-sm font-bold px-2">X Excluir</button>
                                        </div>
                                    `).join('') || '<p class="text-xs text-gray-400">Nenhum aviso cadastrado.</p>'}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            `;
            return container;
        }

        // ==========================================
        // 6. FUNÇÕES DE CRUD (BANCO DE DADOS)
        // ==========================================
        
        // Upload para ImgBB e salvar no Firebase
        window.handleUpload = async (e, collectionName) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = e.target.querySelector('#g-status');
            const file = document.getElementById('g-file').files[0];
            
            if(!file) return;

            btn.disabled = true;
            btn.innerText = "Fazendo upload para ImgBB...";
            status.innerText = "";

            try {
                // 1. Enviar para ImgBB
                const formData = new FormData();
                formData.append("image", file);
                
                const imgbbRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST', body: formData
                });
                const imgbbData = await imgbbRes.json();
                
                if (!imgbbData.success) throw new Error("Falha no upload da imagem");

                const imageUrl = imgbbData.data.url;
                btn.innerText = "Salvando no Banco...";

                // 2. Salvar no Firestore
                const docData = {
                    titulo: document.getElementById('g-titulo').value,
                    descricao: document.getElementById('g-desc').value,
                    data: document.getElementById('g-data').value,
                    imagem: imageUrl
                };

                await addDoc(collection(db, collectionName), docData);
                
                e.target.reset();
                status.innerText = "Foto enviada com sucesso!";
                setTimeout(() => status.innerText = "", 3000);
            } catch (err) {
                status.innerText = "Erro: " + err.message;
                status.classList.add("text-red-500");
            } finally {
                btn.disabled = false;
                btn.innerText = "Fazer Upload e Salvar";
            }
        };

        // Salvar formulário comum (Avisos, Vídeos, Eventos)
        window.handleSave = async (e, collectionName) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                const docData = {};
                // Coletar todos os inputs do formulário
                e.target.querySelectorAll('input, textarea, select').forEach(input => {
                    if(!input.id) return;
                    const key = input.id.split('-')[1]; // Ex: "a-titulo" -> "titulo"
                    if(input.type === 'checkbox') docData[key] = input.checked;
                    else if(input.value) docData[key] = input.value;
                });

                await addDoc(collection(db, collectionName), docData);
                e.target.reset();
            } catch (err) {
                alert("Erro ao salvar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        };

        // Atualizar Configuração Única
        window.saveConfig = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Atualizando...";
            try {
                const docData = {
                    nome: document.getElementById('c-nome').value,
                    subtitulo: document.getElementById('c-subtitulo').value,
                    logo: document.getElementById('c-logo').value,
                    banner: document.getElementById('c-banner').value,
                    tema: document.getElementById('c-tema').value
                };

                if (state.config.id) {
                    await updateDoc(doc(db, "config_site", state.config.id), docData);
                } else {
                    await addDoc(collection(db, "config_site"), docData);
                }
                btn.innerText = "Atualizado com Sucesso!";
                setTimeout(() => btn.innerText = "Atualizar Configurações", 2000);
            } catch (err) {
                alert("Erro ao atualizar config: " + err.message);
                btn.innerText = "Atualizar Configurações";
            }
        };

        // Excluir Documento
        window.deleteItem = async (colName, id) => {
            if (confirm("Tem certeza que deseja excluir este item permanentemente?")) {
                try {
                    await deleteDoc(doc(db, colName, id));
                } catch (err) {
                    alert("Erro ao excluir: " + err.message);
                }
            }
        };

        // Iniciar aplicação
        initApp();
    </script>
</body>
</html>
